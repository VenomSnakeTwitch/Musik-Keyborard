<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Bildgenerator</title>
    <style>
        /* Modernes, dunkles Design */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: #1a1a1a;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            border-bottom: 2px solid #e91e63;
            margin-bottom: 30px;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .info-box {
            background: #252525;
            padding: 15px;
            border-left: 5px solid #e91e63;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        /* Das Iframe, das Perchance lädt */
        .generator-wrapper {
            position: relative;
            width: 100%;
            height: 800px; /* Höhe des Generators */
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            color: #555;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

    <header>
        <h1>Privater Bild-Generator</h1>
    </header>

    <div class="container">
        <div class="info-box">
            <strong>Hinweis:</strong> Dieser Generator nutzt die Technologie von Perchance. Er ist kostenlos, unzensiert und benötigt keine Anmeldung. Gib deine Prompts einfach in das Textfeld unten ein.
        </div>

        <div class="generator-wrapper">
            <iframe src="https://perchance.org/ai-text-to-image-generator" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

    <footer>
        Erstellt mit Hilfe der Perchance Engine &copy; 2026
    </footer>

</body>
</html>
