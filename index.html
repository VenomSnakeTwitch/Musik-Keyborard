<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bildgenerator Pro</title>
    <style>
        body { font-family: sans-serif; background: #050505; color: white; text-align: center; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: #111; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        h2 { color: #ff2e63; }
        textarea { width: 100%; height: 100px; background: #222; color: white; border: 1px solid #444; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff2e63; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px; }
        #output-box { margin-top: 25px; min-height: 300px; border: 2px dashed #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
        img { width: 100%; height: auto; display: none; }
        .loading-text { color: #08d9d6; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Unzensierte KI</h2>
        <textarea id="prompt" placeholder="Beschreibe dein Bild (Englisch)..."></textarea>
        <button onclick="generate()">BILD ERSTELLEN</button>

        <div id="output-box">
            <p id="placeholder">Dein Bild erscheint hier</p>
            <p id="loading" class="loading-text">KI rechnet... bitte warten...</p>
            <img id="resultImage">
        </div>
    </div>

    <script>
        function generate() {
            const prompt = document.getElementById('prompt').value;
            const img = document.getElementById('resultImage');
            const loading = document.getElementById('loading');
            const placeholder = document.getElementById('placeholder');

            if (!prompt) return alert("Bitte Text eingeben!");

            // UI umstellen
            placeholder.style.display = "none";
            img.style.display = "none";
            loading.style.display = "block";

            // Wir nutzen eine URL, die direkt ein Bild zurückgibt
            // Das verhindert den "Failed to fetch" Fehler
            const seed = Math.floor(Math.random() * 100000);
            const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${seed}&width=1024&height=1024&nologo=true`;

            // Bild laden
            img.src = imageUrl;

            img.onload = function() {
                loading.style.display = "none";
                img.style.display = "block";
            };

            img.onerror = function() {
                loading.innerText = "Fehler: Server überlastet. Versuch es nochmal!";
            };
        }
    </script>
</body>
</html>
