<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KI Bildgenerator 2026</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 20px; }
        .box { background: #161616; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; border: 1px solid #333; }
        textarea { width: 100%; height: 80px; margin-top: 10px; border-radius: 5px; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 10px; background: #ff2e63; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #08d9d6; color: black; }
        #output { margin-top: 20px; min-height: 300px; border: 1px dashed #444; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        img { max-width: 100%; border-radius: 8px; }
        .loader { color: #08d9d6; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Privater Bildgenerator</h2>
        <p style="font-size: 0.8em; color: #888;">Kostenlos & Unzensiert</p>
        <textarea id="prompt" placeholder="Beschreibe dein Bild auf Englisch..."></textarea>
        <button onclick="generate()">Bild erstellen</button>

        <div id="output">
            <p id="status">Bereit.</p>
        </div>
    </div>

    <script>
        function generate() {
            const prompt = document.getElementById('prompt').value;
            const output = document.getElementById('output');
            
            if(!prompt) return alert("Text eingeben!");

            output.innerHTML = '<p class="loader">KI rechnet... (ca. 5-10 Sek.)</p>';
            
            const seed = Math.floor(Math.random() * 100000);
            // Neue API URL für 2026
            const url = `https://gen.pollinations.ai/image/${encodeURIComponent(prompt)}?seed=${seed}&width=1024&height=1024&nologo=true`;

            const img = new Image();
            img.onload = function() {
                output.innerHTML = '';
                output.appendChild(img);
            };
            img.onerror = function() {
                output.innerHTML = '<p style="color:red;">Fehler! API ist gerade überlastet.</p>';
            };
            img.src = url;
        }
    </script>
</body>
</html>
