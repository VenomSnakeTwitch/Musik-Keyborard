<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro KI Generator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0c0c0c; color: white; text-align: center; padding: 20px; }
        .card { background: #181818; padding: 25px; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #ff2e63; margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; background: #252525; color: white; border: 1px solid #444; border-radius: 8px; padding: 12px; box-sizing: border-box; font-size: 15px; margin-bottom: 15px; }
        button { width: 100%; padding: 15px; background: #ff2e63; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #08d9d6; color: black; }
        button:disabled { background: #444; cursor: not-allowed; }
        #result { margin-top: 25px; border: 1px solid #333; min-height: 300px; display: flex; align-items: center; justify-content: center; border-radius: 12px; overflow: hidden; background: #000; }
        img { width: 100%; height: auto; display: block; }
        .loader { color: #08d9d6; font-size: 14px; padding: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Unzensierte KI 2.0</h2>
        <textarea id="prompt" placeholder="Beschreibe dein Bild auf Englisch (z.B. 'photorealistic, cinematic, ...')"></textarea>
        <button id="genBtn" onclick="generate()">BILD ERSTELLEN</button>
        
        <div id="result">
            <p id="status">Bereit.</p>
        </div>
    </div>

    <script>
        async function generate() {
            const promptInput = document.getElementById('prompt').value;
            const status = document.getElementById('status');
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('genBtn');

            if (!promptInput) return alert("Bitte Text eingeben!");

            // UI Sperren
            btn.disabled = true;
            status.className = "loader";
            status.innerText = "KI rechnet... Das kann bis zu 30 Sekunden dauern, wenn das Modell gerade erst aufwacht.";
            
            // Dein Token von Hugging Face
            const token = "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"; 

            try {
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/SG161222/Realistic_Vision_V5.1_noVAE",
                    {
                        headers: { 
                            "Authorization": `Bearer ${token}`,
                            "Content-Type": "application/json"
                        },
                        method: "POST",
                        body: JSON.stringify({ inputs: promptInput }),
                    }
                );

                if (!response.ok) {
                    throw new Error("API ist gerade beschäftigt. Bitte in 30 Sek. nochmal versuchen.");
                }

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                resultDiv.innerHTML = `<img src="${url}">`;
            } catch (error) {
                status.innerText = "Fehler: " + error.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
