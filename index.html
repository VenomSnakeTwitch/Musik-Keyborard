<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unzensierter Generator Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        h2 { color: #ff2e63; text-align: center; margin-top: 0; }
        textarea { width: 100%; height: 100px; background: #1a1a1a; color: white; border: 1px solid #444; border-radius: 12px; padding: 12px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; padding: 15px; background: linear-gradient(45deg, #ff2e63, #08d9d6); border: none; color: white; font-weight: bold; border-radius: 12px; cursor: pointer; margin-top: 15px; font-size: 16px; }
        #output { margin-top: 25px; min-height: 350px; background: #000; border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 1px solid #222; position: relative; }
        img { width: 100%; height: auto; border-radius: 15px; display: none; }
        .loader { color: #08d9d6; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <h2>Unzensierte KI 2026</h2>
    <textarea id="prompt" placeholder="Beschreibe dein Bild (z.B. 'masterpiece, hyperrealistic, cinematic lighting...')"></textarea>
    <button onclick="generate()">BILD GENERIEREN</button>

    <div id="output">
        <p id="status" class="loader">Warte auf Eingabe...</p>
        <img id="resultImg" alt="KI Ergebnis">
    </div>
</div>

<script>
    function generate() {
        const prompt = document.getElementById('prompt').value;
        const img = document.getElementById('resultImg');
        const status = document.getElementById('status');
        
        if(!prompt) return alert("Bitte Text eingeben!");

        // UI Reset
        img.style.display = "none";
        status.style.display = "block";
        status.innerText = "KI rechnet... (bitte warten)";

        // Wir nutzen die neue 2026er Pollinations-Domain (Sana Model)
        // Diese ist extrem schnell und unzensiert.
        const seed = Math.floor(Math.random() * 999999);
        const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&nologo=true&model=sana`;

        // Der Trick: Das Bild laden, ohne fetch() zu nutzen (verhindert Überlastungs-Fehler im Script)
        img.src = url;

        img.onload = function() {
            status.style.display = "none";
            img.style.display = "block";
        };

        img.onerror = function() {
            status.innerText = "Fehler: Server antwortet nicht. Versuche einen anderen Prompt.";
        };
    }
</script>

</body>
</html>
