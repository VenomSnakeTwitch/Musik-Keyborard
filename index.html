<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>NSFW Generator (Stable Horde)</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #eee; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #222; padding: 20px; border-radius: 10px; border: 1px solid #444; }
        textarea { width: 100%; height: 80px; background: #333; color: #fff; border: 1px solid #555; border-radius: 5px; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 10px; background: #7b2cbf; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #output { margin-top: 20px; border: 2px dashed #444; border-radius: 10px; min-height: 300px; display: flex; align-items: center; justify-content: center; }
        img { max-width: 100%; border-radius: 8px; }
        .loading { color: #9d4edd; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Unzensierte KI</h2>
        <textarea id="prompt" placeholder="Beschreibe dein Bild (Englisch)..."></textarea>
        <button id="btn" onclick="startGeneration()">Bild generieren</button>
        <div id="output"><p id="status">Warte auf Eingabe...</p></div>
    </div>

    <script>
        async function startGeneration() {
            const prompt = document.getElementById('prompt').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');

            if(!prompt) return alert("Bitte Text eingeben!");

            btn.disabled = true;
            status.innerHTML = '<span class="loading">In Warteschlange...</span>';

            try {
                // 1. Anfrage an Stable Horde senden
                const response = await fetch('https://stablehorde.net/api/v1/generate/async', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': '0000000000' }, // Anonymer Key
                    body: JSON.stringify({
                        prompt: prompt,
                        params: { n: 1, steps: 20, width: 512, height: 512, sampler_name: "k_euler", nsfw: true }
                    })
                });

                const data = await response.json();
                const id = data.id;

                // 2. Status abfragen (Polling)
                const checkStatus = setInterval(async () => {
                    const check = await fetch(`https://stablehorde.net/api/v1/generate/check/${id}`);
                    const checkData = await check.json();
                    
                    if(checkData.done) {
                        clearInterval(checkStatus);
                        const result = await fetch(`https://stablehorde.net/api/v1/generate/status/${id}`);
                        const resultData = await result.json();
                        
                        const imgUrl = resultData.generations[0].img;
                        document.getElementById('output').innerHTML = `<img src="${imgUrl}">`;
                        btn.disabled = false;
                    } else {
                        status.innerText = `Warten... Position in Schlange: ${checkData.wait_time}s`;
                    }
                }, 3000);

            } catch (err) {
                status.innerText = "Fehler! Versuche es gleich nochmal.";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
